name: Deploy to Cloudflare

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npm run build

      # Apply any pending D1 migrations to the production database before the new
      # code goes live. Migrations are additive (CREATE TABLE IF NOT EXISTS), so
      # this is safe to run on every deploy. Uses the root wrangler.json (which
      # declares the d1 binding + migrations_dir).
      - run: npx wrangler d1 migrations apply jkdaycare-d1 --remote
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # @astrojs/cloudflare v14 emits the deploy-ready Wrangler config (with the
      # built worker entry + resolved asset dir) into dist/server/. Deploy that,
      # not the source wrangler.json at the repo root.
      - run: npx wrangler deploy -c dist/server/wrangler.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
